# Four services. `pgdb` is the pgstac Postgres they all read from;
# `stac-api`, `titiler`, `tipg` are the serving APIs.
#
# Defaults below make `docker compose up -d --build` work from a fresh
# clone. To plug into an existing pgstac DB instead, set PG_HOST in `.env`
# and run `docker compose up titiler tipg stac-api` to skip pgdb.
#
# Required env vars (have working defaults): PG_HOST PG_PORT PG_USER
# PG_PASSWORD PG_DBNAME COGS_HOST_DIR
# Optional: GEOSERVE_NETWORK TIPG_SCHEMAS TITILER_GEOM_DB_URL
#           *_CONTAINER  *_MEM_LIMIT  TITILER_WORKERS  GDAL_CACHEMAX

networks:
  default:
    name: ${GEOSERVE_NETWORK:-geoserve_net}

volumes:
  pgstac_data:
    name: ${PGSTAC_DATA_VOLUME:-geoserve_pgstac_data}

services:
  pgdb:
    build: { context: ./pgstac }
    container_name: ${PGDB_CONTAINER:-geoserve-pgdb}
    restart: unless-stopped
    shm_size: 512m
    environment:
      POSTGRES_USER:     ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-pgstac_local}
      POSTGRES_DB:       ${PG_DBNAME:-pgstac}
    volumes:
      - pgstac_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${PG_HOST_PORT:-5439}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DBNAME:-pgstac}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  stac-api:
    build: { context: ./stac-api }
    container_name: ${STACAPI_CONTAINER:-geoserve-stacapi}
    restart: unless-stopped
    depends_on:
      pgdb: { condition: service_healthy }
    mem_limit: 512m
    environment:
      POSTGRES_USER:        ${PG_USER:-postgres}
      POSTGRES_PASS:        ${PG_PASSWORD:-pgstac_local}
      POSTGRES_DBNAME:      ${PG_DBNAME:-pgstac}
      POSTGRES_HOST_READER: ${PG_HOST:-pgdb}
      POSTGRES_HOST_WRITER: ${PG_HOST:-pgdb}
      POSTGRES_PORT:        ${PG_PORT:-5432}
      DB_MIN_CONN_SIZE: ${STACAPI_DB_MIN_CONN:-1}
      DB_MAX_CONN_SIZE: ${STACAPI_DB_MAX_CONN:-5}
    ports:
      - "127.0.0.1:8081:8081"

  titiler:
    build: { context: ./titiler }
    container_name: ${TITILER_CONTAINER:-geoserve-titiler}
    restart: unless-stopped
    depends_on:
      pgdb: { condition: service_healthy }
    mem_limit: ${TITILER_MEM_LIMIT:-1500m}
    environment:
      POSTGRES_USER:   ${PG_USER:-postgres}
      POSTGRES_PASS:   ${PG_PASSWORD:-pgstac_local}
      POSTGRES_DBNAME: ${PG_DBNAME:-pgstac}
      POSTGRES_HOST:   ${PG_HOST:-pgdb}
      POSTGRES_PORT:   ${PG_PORT:-5432}
      DB_MIN_CONN_SIZE: ${TITILER_DB_MIN_CONN:-2}
      DB_MAX_CONN_SIZE: ${TITILER_DB_MAX_CONN:-20}
      WEB_CONCURRENCY: ${TITILER_WORKERS:-4}
      CPL_TMPDIR: /tmp
      GDAL_CACHEMAX: ${GDAL_CACHEMAX:-75%}
      GDAL_INGESTED_BYTES_AT_OPEN: "32768"
      GDAL_DISABLE_READDIR_ON_OPEN: EMPTY_DIR
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"
      GDAL_HTTP_MULTIPLEX: "YES"
      GDAL_HTTP_VERSION: "2"
      VSI_CACHE: "TRUE"
      VSI_CACHE_SIZE: "536870912"
      MOSAIC_CONCURRENCY: "1"
      GEOM_DB_URL: ${TITILER_GEOM_DB_URL:-postgresql://${PG_USER:-postgres}:${PG_PASSWORD:-pgstac_local}@${PG_HOST:-pgdb}:${PG_PORT:-5432}/${PG_DBNAME:-pgstac}}
    volumes:
      - ${COGS_HOST_DIR:-./data/cogs}:/cogs:ro
    ports:
      - "127.0.0.1:8082:8082"

  tipg:
    build: { context: ./tipg }
    container_name: ${TIPG_CONTAINER:-geoserve-tipg}
    restart: unless-stopped
    depends_on:
      pgdb: { condition: service_healthy }
    mem_limit: ${TIPG_MEM_LIMIT:-512m}
    environment:
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASSWORD:-pgstac_local}@${PG_HOST:-pgdb}:${PG_PORT:-5432}/${PG_DBNAME:-pgstac}
      TIPG_DB_SCHEMAS: ${TIPG_SCHEMAS:-["public"]}
      TIPG_DEBUG: ${TIPG_DEBUG:-false}
    ports:
      - "127.0.0.1:8083:8083"
